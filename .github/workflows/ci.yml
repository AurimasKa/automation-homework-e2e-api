name: CI

# Tests run on every push to main/master and on every PR (opened, updated, reopened).
# Trigger: push or open/update PR.
# No branch filter on pull_request = runs for all PRs regardless of base or head branch.
on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: tests
        run: npm test
        env:
          CI: true

      - name: Publish test report
        if: always() && !cancelled()
        uses: dorny/test-reporter@v2
        with:
          name: Playwright Tests
          path: test-reports/junit.xml
          reporter: java-junit
          list-suites: all
          list-tests: failed
          fail-on-error: false
          fail-on-empty: false
          report-title: Playwright test results
          use-actions-summary: true

      - name: Prepare report bundle (HTML report + traces, screenshots, videos)
        if: always()
        run: |
          mkdir -p report-bundle
          cp -r test-reports report-bundle/ 2>/dev/null || true
          cp -r test-results report-bundle/ 2>/dev/null || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: report-bundle/
          retention-days: 30

  pr-comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request' && !cancelled()
    needs: [test]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report

      - name: Playwright report comment
        uses: daun/playwright-report-summary@v3
        if: always()
        with:
          report-file: test-reports/results.json
          test-command: "npm test --"
          job-summary: true
