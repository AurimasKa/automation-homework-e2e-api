name: CI

# Tests run on every push to main/master and on every PR (opened, updated, reopened).
# Trigger: push or open/update PR.
# No branch filter on pull_request = runs for all PRs regardless of base or head branch.
on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: tests
        run: npm test
        env:
          CI: true

      - name: Publish test report
        if: always() && !cancelled()
        uses: dorny/test-reporter@v2
        with:
          name: Playwright Tests
          path: test-reports/junit.xml
          reporter: java-junit
          list-suites: all
          list-tests: failed
          fail-on-error: false
          fail-on-empty: false
          report-title: Playwright test results
          use-actions-summary: true

      - name: Prepare report bundle (HTML report + traces, screenshots, videos)
        if: always()
        run: |
          mkdir -p report-bundle
          cp -r test-reports report-bundle/ 2>/dev/null || true
          cp -r test-results report-bundle/ 2>/dev/null || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: report-bundle/
          retention-days: 30

  deploy-report:
    name: Deploy report to GitHub Pages
    runs-on: ubuntu-latest
    if: always() && !cancelled() && needs.test.result != 'cancelled' && (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.event_name == 'pull_request')
    needs: [test]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Download playwright-report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report

      - name: Prepare report for Pages
        run: |
          mkdir -p report-root
          if [ -f test-reports/index.html ]; then
            cp -r test-reports/. report-root/
          elif [ -f playwright-report/test-reports/index.html ]; then
            cp -r playwright-report/test-reports/. report-root/
          else
            find . -name index.html
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report-root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
    continue-on-error: true

  pr-comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request' && !cancelled()
    needs: [test, deploy-report]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report

      - name: Playwright report comment
        uses: daun/playwright-report-summary@v3
        if: always()
        with:
          report-file: test-reports/results.json
          test-command: "npm test --"
          job-summary: true
          report-url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
