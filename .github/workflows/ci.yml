name: CI

# Tests run on every push to main/master and on every PR (opened, updated, reopened).
# Trigger: push or open/update PR.
# No branch filter on pull_request = runs for all PRs regardless of base or head branch.
on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: tests
        run: npm test
        env:
          CI: true

      - name: Publish test report
        if: always() && !cancelled()
        uses: dorny/test-reporter@v2
        with:
          name: Playwright Tests
          path: test-reports/junit.xml
          reporter: java-junit
          list-suites: all
          list-tests: failed
          fail-on-error: false
          fail-on-empty: false
          report-title: Playwright test results
          use-actions-summary: true

      - name: Prepare report bundle (HTML report + traces, screenshots, videos)
        if: always()
        run: |
          mkdir -p report-bundle
          cp -r test-reports report-bundle/ 2>/dev/null || true
          cp -r test-results report-bundle/ 2>/dev/null || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: report-bundle/
          retention-days: 30

  # Deploys the Playwright HTML report so the PR comment link opens in the browser.
  # Only deploys from default branch (environment protection rules block PR branches).
  # Enable in repo: Settings → Pages → Source: GitHub Actions.
  deploy-report:
    name: Deploy report to GitHub Pages
    runs-on: ubuntu-latest
    if: always() && !cancelled() && needs.test.result != 'cancelled' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [test]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Download playwright-report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: test-reports

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
    continue-on-error: true

  pr-comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request' && !cancelled()
    needs: [test]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report

      - name: Generate PR comment body
        run: node .github/scripts/generate-pr-comment.mjs
        env:
          RESULTS_JSON_PATH: ${{ github.workspace }}/test-reports/results.json
          TEST_RESULT: ${{ needs.test.result }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}

      - name: Comment test results
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: pr-comment-body.md
          edit-mode: replace
