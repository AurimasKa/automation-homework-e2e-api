name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: tests
        run: npm test
        env:
          CI: true

      - name: Test result summary
        if: always()
        run: |
          echo "## ${{ steps.tests.outcome == 'success' && '✅ All tests passed' || '❌ Tests failed' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.tests.outcome }}" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Download the **playwright-report** artifact below, then view the report with traces and screenshots." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Prepare report bundle (HTML report + traces, screenshots, videos)
        if: always()
        run: |
          mkdir -p report-bundle
          cp -r test-reports report-bundle/ 2>/dev/null || true
          cp -r test-results report-bundle/ 2>/dev/null || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: report-bundle/
          retention-days: 30

  pr-comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs: [test]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Comment test results
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Playwright test results
            ${{ needs.test.result == 'success' && '✅ **All tests passed**' || '❌ **Tests failed**' }}

            **View the report (with traces, screenshots, videos):**
            1. Open the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            2. Download the **playwright-report** artifact at the bottom
            3. Extract the zip
            4. In the extracted folder, run: `npx playwright show-report test-reports`
            5. Open the URL in your browser to see the full HTML report and trace viewer
          edit-mode: replace
