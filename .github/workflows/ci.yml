# Reproducible CI: Node from .nvmrc, dependencies from package-lock.json (npm ci),
# Playwright from lockfile. Pin actions to full tags for reproducibility.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: tests
        run: npm test
        env:
          CI: true

      - name: Test result summary
        if: always()
        run: |
          echo "## ${{ steps.tests.outcome == 'success' && '✅ All tests passed' || '❌ Tests failed' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.tests.outcome }}" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Download the **playwright-html-report** and **playwright-test-results** artifacts for:" >> $GITHUB_STEP_SUMMARY
            echo "- HTML report (open \`index.html\` in browser)" >> $GITHUB_STEP_SUMMARY
            echo "- Screenshots, videos, traces, JUnit/JSON results" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (screenshots, videos, traces)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14
