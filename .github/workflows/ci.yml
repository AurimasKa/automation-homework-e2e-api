name: CI

# Tests run on every push to main/master and on every PR (opened, updated, reopened).
# Trigger: push or open/update PR.
# No branch filter on pull_request = runs for all PRs regardless of base or head branch.
on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: tests
        run: npm test
        env:
          CI: true

      - name: Publish test report
        if: always() && !cancelled()
        uses: dorny/test-reporter@v2
        with:
          name: Playwright Tests
          path: test-reports/junit.xml
          reporter: java-junit
          list-suites: all
          list-tests: failed
          fail-on-error: false
          fail-on-empty: false
          report-title: Playwright test results
          use-actions-summary: true

      # Built-in Playwright reports saved as artifacts.
      - name: Prepare report bundle (HTML report + traces, screenshots, videos)
        if: always()
        run: |
          mkdir -p report-bundle
          cp -r test-reports report-bundle/ 2>/dev/null || true
          cp -r test-results report-bundle/ 2>/dev/null || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: report-bundle/
          retention-days: 30

  # Deploy report to Netlify so "View report" in the PR comment opens in the browser.
  # Add repo secrets: NETLIFY_AUTH_TOKEN, NETLIFY_SITE_ID (create a site at netlify.com first).
  deploy-report:
    name: Deploy report to Netlify
    runs-on: ubuntu-latest
    if: always() && !cancelled() && needs.test.result != 'cancelled' && (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.event_name == 'pull_request')
    needs: [test]
    permissions:
      contents: read
    outputs:
      report_url: ${{ steps.deploy.outputs.NETLIFY_LIVE_URL }}
    steps:
      - name: Download playwright-report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report

      - name: Prepare report for deploy
        run: |
          mkdir -p report-root
          if [ -f test-reports/index.html ]; then
            cp -r test-reports/. report-root/
          elif [ -f playwright-report/test-reports/index.html ]; then
            cp -r playwright-report/test-reports/. report-root/
          else
            find . -name index.html
            exit 1
          fi
          test -f report-root/index.html || (ls -la report-root && exit 1)

      - name: Deploy to Netlify
        id: deploy
        uses: jsmrcaga/action-netlify-deploy@v2.0.0
        with:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_DEPLOY_TO_PROD: true
          build_directory: report-root
          install_command: "echo Skipping install"
          build_command: "echo Skipping build"
    continue-on-error: true

  pr-comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request' && !cancelled()
    needs: [test, deploy-report]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report

      - name: Upload screenshots for comment
        id: screenshots
        if: always()
        run: |
          echo "screenshots_md<<EOF" >> $GITHUB_OUTPUT
          echo "### Failure screenshots" >> $GITHUB_OUTPUT
          count=0
          for f in $(find test-results -type f -name "*.png" 2>/dev/null | head -10); do
            name=$(basename "$f" .png)
            url=$(curl -sS --upload-file "$f" "https://transfer.sh/${name}.png" 2>/dev/null) || true
            if [ -n "$url" ]; then
              echo "**$name**" >> $GITHUB_OUTPUT
              echo "![screenshot]($url)" >> $GITHUB_OUTPUT
              count=$((count + 1))
            fi
          done
          if [ $count -eq 0 ]; then
            echo "_No failure screenshots (or none uploaded)._" >> $GITHUB_OUTPUT
          fi
          echo "" >> $GITHUB_OUTPUT
          echo "**Videos & full report:** Download the **playwright-report** artifact, extract it, then run \`npx playwright show-report test-reports\` to view videos and the full report." >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Playwright report comment
        uses: daun/playwright-report-summary@v3
        if: always()
        with:
          report-file: test-reports/results.json
          test-command: "npm test --"
          job-summary: true
          report-url: ${{ needs.deploy-report.outputs.report_url }}
          footer: ${{ steps.screenshots.outputs.screenshots_md }}
