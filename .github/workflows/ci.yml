name: CI

# Tests run on every push to main/master and on every PR (opened, updated, reopened).
# No branch filter on pull_request = runs for all PRs regardless of base or head branch.
on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: tests
        run: npm test
        env:
          CI: true

      - name: Publish test report
        if: always() && !cancelled()
        uses: dorny/test-reporter@v2
        with:
          name: Playwright Tests
          path: test-reports/junit.xml
          reporter: java-junit
          list-suites: all
          list-tests: failed
          fail-on-error: false
          fail-on-empty: false
          report-title: Playwright test results
          use-actions-summary: true

      - name: Prepare report bundle (HTML report + traces, screenshots, videos)
        if: always()
        run: |
          mkdir -p report-bundle
          cp -r test-reports report-bundle/ 2>/dev/null || true
          cp -r test-results report-bundle/ 2>/dev/null || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: report-bundle/
          retention-days: 30

  deploy-report:
    name: Publish report to GitHub Pages
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    needs: [test]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update gh-pages
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify refs/remotes/origin/gh-pages 2>/dev/null; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            echo "# Reports" > README.md
            git add README.md
            git commit -m "Init gh-pages"
            git push -u origin gh-pages
          fi

      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report

      - name: Publish report for this run
        run: |
          RUN_DIR="report/run-${{ github.run_id }}"
          mkdir -p "$RUN_DIR"
          cp -r test-reports "$RUN_DIR/" 2>/dev/null || true
          cp -r test-results "$RUN_DIR/" 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report/
          git diff --staged --quiet || git commit -m "Report: run ${{ github.run_id }}"
          git push

  pr-comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs: [test, deploy-report]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report

      - name: Generate PR comment body
        run: node .github/scripts/generate-pr-comment.mjs
        env:
          RESULTS_JSON_PATH: ${{ github.workspace }}/test-reports/results.json
          TEST_RESULT: ${{ needs.test.result }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}

      - name: Comment test results
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: pr-comment-body.md
          edit-mode: replace
